<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">CONTEXT  ENGINEERING</text>
    <text x="80" y="186" font-size="60" font-weight="800" fill="#f8fafc">Tool selection</text>
    <text x="80" y="252" font-size="60" font-weight="800" fill="url(#amberGrad)">at 200 tools</text>
    <text x="80" y="308" font-size="22" font-weight="400" fill="#cbd5e1">Namespacing · RAG · dynamic loading · Code Mode</text>
  </g>

  <!-- Accuracy curve -->
  <g transform="translate(80, 380)" filter="url(#softShadow)">
    <rect x="0" y="0" width="450" height="190" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <text x="22" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">SELECTION ACCURACY vs TOOL COUNT</text>
    <!-- axes -->
    <line x1="50" y1="160" x2="430" y2="160" stroke="#475569" stroke-width="1"/>
    <line x1="50" y1="55" x2="50" y2="160" stroke="#475569" stroke-width="1"/>
    <text x="50" y="178" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="middle">10</text>
    <text x="160" y="178" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="middle">30</text>
    <text x="280" y="178" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="middle">100</text>
    <text x="400" y="178" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="middle">200</text>
    <text x="36" y="60" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="end">95%</text>
    <text x="36" y="115" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="end">80%</text>
    <text x="36" y="155" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="end">60%</text>

    <!-- the curve, falling off a cliff -->
    <path d="M 50 60 L 160 65 Q 220 70 280 115 Q 340 145 400 155" stroke="url(#roseGrad)" stroke-width="3" fill="none"/>
    <circle cx="50" cy="60" r="4" fill="#34d399"/>
    <circle cx="160" cy="65" r="4" fill="#34d399"/>
    <circle cx="280" cy="115" r="4" fill="#fbbf24"/>
    <circle cx="400" cy="155" r="4" fill="#fb7185"/>

    <text x="160" y="50" font-family="Inter, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">happy</text>
    <text x="400" y="135" font-family="Inter, sans-serif" font-size="10" fill="#fb7185" text-anchor="middle">cliff</text>
  </g>

  <!-- Funnel of fixes -->
  <g transform="translate(610, 380)" filter="url(#softShadow)">
    <rect x="0" y="0" width="510" height="190" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <text x="22" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">FOUR FIXES, STACKED</text>

    <g transform="translate(22, 50)">
      <rect x="0" y="0" width="100" height="120" rx="8" fill="#1e293b" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <text x="50" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#22d3ee" letter-spacing="1">NAMESPACE</text>
      <text x="50" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f8fafc">12</text>
      <text x="50" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">groups visible</text>
    </g>
    <g transform="translate(135, 50)">
      <rect x="0" y="0" width="100" height="120" rx="8" fill="#1e293b" stroke="url(#greenGrad)" stroke-width="1.5"/>
      <text x="50" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#34d399" letter-spacing="1">RAG</text>
      <text x="50" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f8fafc">15</text>
      <text x="50" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">retrieved/turn</text>
    </g>
    <g transform="translate(248, 50)">
      <rect x="0" y="0" width="100" height="120" rx="8" fill="#1e293b" stroke="url(#amberGrad)" stroke-width="1.5"/>
      <text x="50" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#fbbf24" letter-spacing="1">DYNAMIC</text>
      <text x="50" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f8fafc">∞</text>
      <text x="50" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">on demand</text>
    </g>
    <g transform="translate(361, 50)">
      <rect x="0" y="0" width="125" height="120" rx="8" fill="#1e293b" stroke="url(#roseGrad)" stroke-width="1.5"/>
      <text x="62" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#fb7185" letter-spacing="1">CODE MODE</text>
      <text x="62" y="70" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#f8fafc">2</text>
      <text x="62" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">search + execute</text>
    </g>
  </g>

  <g transform="translate(80, 590)">
    <circle cx="0" cy="-6" r="5" fill="url(#amberGrad)"/>
    <text x="14" y="0" font-family="Inter, sans-serif" font-size="14" fill="#64748b">bvsbharat.com  ·  Feb 2026</text>
  </g>
</svg>
