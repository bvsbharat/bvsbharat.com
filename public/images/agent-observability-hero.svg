<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">OBSERVABILITY</text>
    <text x="80" y="186" font-size="60" font-weight="800" fill="#f8fafc">OpenTelemetry</text>
    <text x="80" y="252" font-size="60" font-weight="800" fill="url(#indigoGrad)">just won.</text>
    <text x="80" y="308" font-size="22" font-weight="400" fill="#cbd5e1">GenAI semantic conventions · trace replay · Langfuse on ClickHouse</text>
  </g>

  <!-- waterfall trace -->
  <g transform="translate(80, 360)" filter="url(#softShadow)">
    <rect x="0" y="0" width="1040" height="200" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <text x="22" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">gen_ai.invoke_agent  ·  trace 4f2a-bd9c</text>

    <!-- waterfall rows -->
    <g transform="translate(22, 50)">
      <!-- parent span -->
      <rect x="0" y="0" width="990" height="18" rx="3" fill="url(#indigoGrad)" opacity="0.85"/>
      <text x="6" y="13" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#0f172a" font-weight="700">invoke_agent</text>

      <!-- llm call 1 -->
      <rect x="20" y="26" width="120" height="14" rx="2" fill="url(#cyanGrad)" opacity="0.9"/>
      <text x="146" y="36" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#94a3b8">gen_ai.client · Opus</text>

      <!-- tool call -->
      <rect x="80" y="46" width="70" height="14" rx="2" fill="url(#greenGrad)" opacity="0.9"/>
      <text x="156" y="56" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#94a3b8">execute_tool · github.search</text>

      <!-- sub-agent invoke -->
      <rect x="180" y="66" width="380" height="14" rx="2" fill="url(#amberGrad)" opacity="0.9"/>
      <text x="566" y="76" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#94a3b8">invoke_agent · sub:research</text>

      <!-- nested calls -->
      <rect x="220" y="86" width="100" height="12" rx="2" fill="url(#cyanGrad)" opacity="0.7"/>
      <rect x="330" y="86" width="80" height="12" rx="2" fill="url(#greenGrad)" opacity="0.7"/>
      <rect x="420" y="86" width="120" height="12" rx="2" fill="url(#cyanGrad)" opacity="0.7"/>

      <!-- llm call 2 -->
      <rect x="600" y="66" width="60" height="14" rx="2" fill="url(#cyanGrad)" opacity="0.9"/>

      <!-- critic -->
      <rect x="680" y="46" width="160" height="14" rx="2" fill="url(#roseGrad)" opacity="0.9"/>
      <text x="846" y="56" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#94a3b8">execute_tool · outcomes.score</text>

      <!-- final llm -->
      <rect x="870" y="26" width="100" height="14" rx="2" fill="url(#cyanGrad)" opacity="0.9"/>

      <!-- ruler -->
      <line x1="0" y1="118" x2="990" y2="118" stroke="#334155" stroke-width="1"/>
      <text x="0" y="134" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b">0s</text>
      <text x="247" y="134" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b">2s</text>
      <text x="495" y="134" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b">4s</text>
      <text x="742" y="134" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b">6s</text>
      <text x="990" y="134" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#64748b" text-anchor="end">8.2s</text>
    </g>
  </g>

  <g transform="translate(80, 590)">
    <circle cx="0" cy="-6" r="5" fill="url(#indigoGrad)"/>
    <text x="14" y="0" font-family="Inter, sans-serif" font-size="14" fill="#64748b">bvsbharat.com  ·  May 2026</text>
  </g>
</svg>
