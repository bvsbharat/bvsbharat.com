<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">WEB  AGENTS</text>
    <text x="80" y="186" font-size="60" font-weight="800" fill="#f8fafc">Operator died.</text>
    <text x="80" y="252" font-size="60" font-weight="800" fill="url(#cyanGrad)">Browser Use ate the world.</text>
    <text x="80" y="308" font-size="22" font-weight="400" fill="#cbd5e1">The substrate that survived the long tail</text>
  </g>

  <!-- WebArena leaderboard -->
  <g transform="translate(720, 130)" filter="url(#softShadow)">
    <rect x="0" y="0" width="430" height="320" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <text x="24" y="38" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">WEBARENA LIVE · MAR 2026</text>

    <g transform="translate(24, 60)">
      <text x="0" y="20" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">Manus</text>
      <rect x="120" y="6" width="234" height="18" rx="3" fill="url(#greenGrad)"/>
      <text x="365" y="22" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#34d399">73.4%</text>

      <text x="0" y="56" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">Browser Use Cloud</text>
      <rect x="120" y="42" width="226" height="18" rx="3" fill="url(#cyanGrad)"/>
      <text x="365" y="58" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#22d3ee">71.1%</text>

      <text x="0" y="92" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">Browser Use OSS</text>
      <rect x="120" y="78" width="206" height="18" rx="3" fill="url(#indigoGrad)"/>
      <text x="365" y="94" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#818cf8">64.8%</text>

      <text x="0" y="128" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">Computer Use</text>
      <rect x="120" y="114" width="186" height="18" rx="3" fill="url(#amberGrad)"/>
      <text x="365" y="130" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#fbbf24">58.3%</text>

      <text x="0" y="164" font-family="Inter, sans-serif" font-size="13" fill="#475569" text-decoration="line-through">OpenAI Operator</text>
      <rect x="120" y="150" width="0" height="18" rx="3" fill="#475569"/>
      <text x="365" y="166" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#475569">RIP 8/31/25</text>
    </g>

    <line x1="24" y1="248" x2="406" y2="248" stroke="#334155" stroke-width="1"/>
    <text x="24" y="276" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">REWEB-2026  ·  THE LONG TAIL</text>
    <text x="24" y="298" font-family="Inter, sans-serif" font-size="13" fill="#fb7185">Top score: 41%</text>
  </g>

  <g transform="translate(80, 590)">
    <circle cx="0" cy="-6" r="5" fill="url(#cyanGrad)"/>
    <text x="14" y="0" font-family="Inter, sans-serif" font-size="14" fill="#64748b">bvsbharat.com  ·  Mar 2026</text>
  </g>
</svg>
