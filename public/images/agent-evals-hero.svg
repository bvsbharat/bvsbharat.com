<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENT  EVALS</text>
    <text x="80" y="186" font-size="60" font-weight="800" fill="#f8fafc">Beyond</text>
    <text x="80" y="252" font-size="60" font-weight="800" fill="#fbbf24">LLM-as-judge</text>
    <text x="80" y="308" font-size="22" font-weight="400" fill="#cbd5e1">The test pyramid for production agents</text>
  </g>

  <g transform="translate(720, 130)" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" filter="url(#softShadow)">
    <polygon points="180,0 230,50 130,50" fill="#1e293b" stroke="#fb7185" stroke-width="2"/>
    <text x="180" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#fb7185" letter-spacing="1.5">LIVE A/B</text>

    <polygon points="130,50 230,50 270,110 90,110" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="180" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24" letter-spacing="1.5">GOLDEN REPLAYS</text>

    <polygon points="90,110 270,110 320,180 40,180" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="180" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#22d3ee" letter-spacing="1.5">TRAJECTORY · RUBRIC</text>
    <text x="180" y="166" text-anchor="middle" font-size="10" fill="#94a3b8">structured checks · path checks</text>

    <polygon points="40,180 320,180 370,260 -10,260" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="180" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399" letter-spacing="1.5">UNIT TESTS</text>
    <text x="180" y="240" text-anchor="middle" font-size="10" fill="#94a3b8">sub-agents · parsers · distillers</text>

    <text x="380" y="36" font-size="11" fill="#94a3b8">real users</text>
    <text x="380" y="88" font-size="11" fill="#94a3b8">known I/O</text>
    <text x="380" y="148" font-size="11" fill="#94a3b8">structural</text>
    <text x="380" y="220" font-size="11" fill="#94a3b8">fast &amp; cheap</text>

    <g transform="translate(-50, 30)">
      <line x1="0" y1="0" x2="0" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow2)"/>
      <text x="-10" y="6" text-anchor="end" font-size="10" fill="#94a3b8">slow</text>
      <text x="-10" y="222" text-anchor="end" font-size="10" fill="#94a3b8">fast</text>
    </g>
  </g>

  <g transform="translate(80, 480)" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <rect x="0" y="0" width="540" height="82" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <text x="22" y="32" font-size="11" font-weight="700" fill="#fb7185" letter-spacing="2">STOP DOING</text>
    <text x="22" y="58" font-size="14" fill="#e2e8f0">single-score · same-model judge · CI-only · no cost evals</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="#fbbf24"/>
    <text x="14" y="0" font-size="14" fill="#94a3b8">bvsbharat.com  ·  Apr 2026</text>
  </g>
</svg>
