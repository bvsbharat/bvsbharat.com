<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">ORCHESTRATION  PATTERNS</text>
    <text x="80" y="186" font-size="60" font-weight="800" fill="#f8fafc">Sub-agents are</text>
    <text x="80" y="252" font-size="60" font-weight="800" fill="url(#roseGrad)">the new microservices</text>
    <text x="80" y="308" font-size="22" font-weight="400" fill="#cbd5e1">Manager-worker, depth-1, per-task model choice</text>
  </g>

  <!-- Lead + 4 workers diagram -->
  <g transform="translate(720, 100)" filter="url(#softShadow)">
    <!-- user -->
    <g transform="translate(140, 0)">
      <rect x="-50" y="0" width="100" height="40" rx="20" fill="#0b1220" stroke="#475569" stroke-width="1.5"/>
      <text x="0" y="25" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#94a3b8">User</text>
    </g>

    <!-- lead -->
    <g transform="translate(60, 90)">
      <rect x="0" y="0" width="240" height="80" rx="14" fill="#1e293b" stroke="url(#amberGrad)" stroke-width="2.5"/>
      <text x="120" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#fbbf24" letter-spacing="2">LEAD AGENT</text>
      <text x="120" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">holds the plan</text>
      <text x="120" y="68" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#64748b">Opus 4.7</text>
    </g>

    <!-- connecting arrows -->
    <g stroke="#475569" stroke-width="1.5" fill="none" stroke-dasharray="4 4" opacity="0.7">
      <path d="M 140 40 L 140 90"/>
      <path d="M 100 170 L 40 220"/>
      <path d="M 160 170 L 140 220"/>
      <path d="M 220 170 L 240 220"/>
      <path d="M 280 170 L 340 220"/>
    </g>

    <!-- 4 workers -->
    <g transform="translate(0, 230)">
      <rect x="0" y="0" width="80" height="80" rx="10" fill="#1e293b" stroke="url(#greenGrad)" stroke-width="2"/>
      <text x="40" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#34d399" letter-spacing="1.5">RESEARCH</text>
      <text x="40" y="50" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#94a3b8">Sonnet</text>
      <circle cx="40" cy="64" r="3" fill="#34d399" filter="url(#glow)"/>
    </g>
    <g transform="translate(100, 230)">
      <rect x="0" y="0" width="80" height="80" rx="10" fill="#1e293b" stroke="url(#cyanGrad)" stroke-width="2"/>
      <text x="40" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#22d3ee" letter-spacing="1.5">REVIEW</text>
      <text x="40" y="50" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#94a3b8">Haiku</text>
      <circle cx="40" cy="64" r="3" fill="#22d3ee" filter="url(#glow)"/>
    </g>
    <g transform="translate(200, 230)">
      <rect x="0" y="0" width="80" height="80" rx="10" fill="#1e293b" stroke="url(#indigoGrad)" stroke-width="2"/>
      <text x="40" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#818cf8" letter-spacing="1.5">VERIFY</text>
      <text x="40" y="50" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#94a3b8">Opus</text>
      <circle cx="40" cy="64" r="3" fill="#818cf8" filter="url(#glow)"/>
    </g>
    <g transform="translate(300, 230)">
      <rect x="0" y="0" width="80" height="80" rx="10" fill="#1e293b" stroke="url(#roseGrad)" stroke-width="2"/>
      <text x="40" y="30" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#fb7185" letter-spacing="1.5">PARSE</text>
      <text x="40" y="50" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#94a3b8">Haiku</text>
      <circle cx="40" cy="64" r="3" fill="#fb7185" filter="url(#glow)"/>
    </g>

    <text x="190" y="365" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b" font-style="italic">depth-1 only · stateless workers · per-task model</text>
  </g>

  <g transform="translate(80, 590)">
    <circle cx="0" cy="-6" r="5" fill="url(#roseGrad)"/>
    <text x="14" y="0" font-family="Inter, sans-serif" font-size="14" fill="#64748b">bvsbharat.com  ·  Feb 2026</text>
  </g>
</svg>
