<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">LONG-HORIZON  AGENTS</text>
    <text x="80" y="186" font-size="60" font-weight="800" fill="#f8fafc">6h 41min.</text>
    <text x="80" y="252" font-size="60" font-weight="800" fill="url(#greenGrad)">23 pull requests.</text>
    <text x="80" y="308" font-size="22" font-weight="400" fill="#cbd5e1">When the harness matters more than the model</text>
  </g>

  <!-- Timeline -->
  <g transform="translate(80, 380)" filter="url(#softShadow)">
    <rect x="0" y="0" width="1040" height="180" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <text x="22" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">OVERNIGHT RUN  ·  11pm → 5am</text>

    <!-- timeline track -->
    <line x1="40" y1="100" x2="1000" y2="100" stroke="#334155" stroke-width="2"/>

    <!-- progress bar -->
    <rect x="40" y="96" width="960" height="8" rx="4" fill="url(#greenGrad)" opacity="0.7"/>

    <!-- checkpoints / events -->
    <g font-family="Inter, sans-serif" font-size="10" text-anchor="middle">
      <!-- start -->
      <circle cx="40" cy="100" r="8" fill="url(#indigoGrad)" filter="url(#glow2)"/>
      <text x="40" y="80" fill="#818cf8" font-weight="700">START</text>
      <text x="40" y="128" fill="#64748b">11:00 PM</text>

      <!-- crash & recover -->
      <circle cx="220" cy="100" r="8" fill="url(#roseGrad)" filter="url(#glow2)"/>
      <text x="220" y="80" fill="#fb7185" font-weight="700">CRASH</text>
      <text x="220" y="128" fill="#64748b">+ recover from ckpt</text>

      <!-- midpoint checkpoint -->
      <circle cx="430" cy="100" r="7" fill="url(#cyanGrad)" filter="url(#glow2)"/>
      <text x="430" y="80" fill="#22d3ee" font-weight="700">CHECKPOINT</text>
      <text x="430" y="128" fill="#64748b">2:14 AM</text>

      <!-- tool failure / retry -->
      <circle cx="620" cy="100" r="7" fill="url(#amberGrad)" filter="url(#glow2)"/>
      <text x="620" y="80" fill="#fbbf24" font-weight="700">TOOL RETRY</text>
      <text x="620" y="128" fill="#64748b">3:08 AM</text>

      <!-- CI poll -->
      <circle cx="800" cy="100" r="7" fill="url(#cyanGrad)" filter="url(#glow2)"/>
      <text x="800" y="80" fill="#22d3ee" font-weight="700">CI POLL</text>
      <text x="800" y="128" fill="#64748b">4:21 AM</text>

      <!-- done -->
      <circle cx="1000" cy="100" r="8" fill="url(#greenGrad)" filter="url(#glow2)"/>
      <text x="1000" y="80" fill="#34d399" font-weight="700">DONE</text>
      <text x="1000" y="128" fill="#64748b">5:41 AM · 23 PRs</text>
    </g>

    <text x="520" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#64748b" font-style="italic">workspace + plan + event log + recovery controller</text>
  </g>

  <g transform="translate(80, 590)">
    <circle cx="0" cy="-6" r="5" fill="url(#greenGrad)"/>
    <text x="14" y="0" font-family="Inter, sans-serif" font-size="14" fill="#64748b">bvsbharat.com  ·  May 2026</text>
  </g>
</svg>
