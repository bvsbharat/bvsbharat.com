<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="tealVoiceGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="vh1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">VOICE  AGENTS  ·  ARCHITECTURE</text>
    <text x="80" y="192" font-size="56" font-weight="800" fill="#f8fafc">Cascaded vs Fused.</text>
    <text x="80" y="258" font-size="56" font-weight="800" fill="url(#tealVoiceGrad)">A builder's view.</text>
    <text x="80" y="312" font-size="20" font-weight="400" fill="#cbd5e1">Trust, naturalness, and the spectrum in between</text>
  </g>

  <g transform="translate(80, 380)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#5eead4" letter-spacing="2">CASCADED — most control</text>

    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="60" height="48" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
      <path d="M 22 14 L 22 28 M 38 14 L 38 28 M 18 28 Q 30 38 42 28" stroke="#7dd3fc" stroke-width="2" fill="none"/>
      <rect x="84" y="0" width="80" height="48" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
      <text x="124" y="30" text-anchor="middle" fill="#7dd3fc" font-size="14" font-weight="700">STT</text>
      <rect x="188" y="0" width="80" height="48" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
      <text x="228" y="30" text-anchor="middle" fill="#34d399" font-size="14" font-weight="700">LLM</text>
      <rect x="292" y="0" width="80" height="48" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
      <text x="332" y="30" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">TTS</text>
      <rect x="396" y="0" width="60" height="48" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
      <path d="M 408 18 L 416 18 L 424 10 L 424 38 L 416 30 L 408 30 Z" fill="#7dd3fc"/>
      <path d="M 432 20 Q 438 24 432 28" stroke="#7dd3fc" stroke-width="1.5" fill="none"/>

      <line x1="60" y1="24" x2="82" y2="24" stroke="#94a3b8" stroke-width="2" marker-end="url(#vh1)"/>
      <line x1="164" y1="24" x2="186" y2="24" stroke="#94a3b8" stroke-width="2" marker-end="url(#vh1)"/>
      <line x1="268" y1="24" x2="290" y2="24" stroke="#94a3b8" stroke-width="2" marker-end="url(#vh1)"/>
      <line x1="372" y1="24" x2="394" y2="24" stroke="#94a3b8" stroke-width="2" marker-end="url(#vh1)"/>
    </g>

    <text x="0" y="98" font-size="11" fill="#94a3b8">guardrails · debug · swap models</text>
  </g>

  <g transform="translate(620, 380)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#fb7185" letter-spacing="2">FUSED — most natural</text>

    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="60" height="48" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
      <path d="M 22 14 L 22 28 M 38 14 L 38 28 M 18 28 Q 30 38 42 28" stroke="#7dd3fc" stroke-width="2" fill="none"/>

      <rect x="84" y="0" width="288" height="48" rx="12" fill="#1e293b" stroke="#fb7185" stroke-width="2.5"/>
      <text x="228" y="22" text-anchor="middle" fill="#fda4af" font-size="11" font-weight="700" letter-spacing="2">SINGLE  END-TO-END</text>
      <text x="228" y="38" text-anchor="middle" fill="#fda4af" font-size="11" font-weight="700">NETWORK</text>

      <rect x="396" y="0" width="60" height="48" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
      <path d="M 408 18 L 416 18 L 424 10 L 424 38 L 416 30 L 408 30 Z" fill="#7dd3fc"/>
      <path d="M 432 20 Q 438 24 432 28" stroke="#7dd3fc" stroke-width="1.5" fill="none"/>

      <line x1="60" y1="24" x2="82" y2="24" stroke="#94a3b8" stroke-width="2" marker-end="url(#vh1)"/>
      <line x1="372" y1="24" x2="394" y2="24" stroke="#94a3b8" stroke-width="2" marker-end="url(#vh1)"/>
    </g>

    <text x="0" y="98" font-size="11" fill="#94a3b8">prosody · low latency · black box</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#tealVoiceGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Apr 17, 2026</text>
  </g>
