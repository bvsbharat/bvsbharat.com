<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">MCP  ECOSYSTEM</text>
    <text x="80" y="186" font-size="60" font-weight="800" fill="#f8fafc">Just Crossed</text>
    <text x="80" y="252" font-size="60" font-weight="800" fill="url(#cyanGrad)">the Inflection Point</text>
    <text x="80" y="308" font-size="22" font-weight="400" fill="#cbd5e1">Registries, governance, and 15,000 servers later</text>
  </g>

  <!-- Growth bars on the right -->
  <g transform="translate(720, 130)" filter="url(#softShadow)">
    <rect x="0" y="0" width="430" height="370" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <text x="24" y="38" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">SERVERS TRACKED</text>

    <!-- bars -->
    <g transform="translate(24, 60)">
      <text x="0" y="20" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#64748b">Jan 2025</text>
      <rect x="120" y="6" width="20" height="20" rx="3" fill="#475569"/>
      <text x="150" y="22" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#cbd5e1">714</text>

      <text x="0" y="64" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#64748b">Jul 2025</text>
      <rect x="120" y="50" width="80" height="20" rx="3" fill="#0ea5e9" opacity="0.7"/>
      <text x="210" y="66" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#cbd5e1">3,200</text>

      <text x="0" y="108" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#64748b">Dec 2025</text>
      <rect x="120" y="94" width="170" height="20" rx="3" fill="url(#cyanGrad)" opacity="0.85"/>
      <text x="300" y="110" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#cbd5e1">6,800</text>

      <text x="0" y="152" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#22d3ee" font-weight="700">Jan 2026</text>
      <rect x="120" y="138" width="266" height="22" rx="3" fill="url(#cyanGrad)"/>
      <text x="394" y="156" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#f8fafc" font-weight="700">15,930</text>
    </g>

    <!-- registry list -->
    <g transform="translate(24, 250)" font-family="Inter, sans-serif">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">REGISTRIES</text>
      <g transform="translate(0, 18)">
        <circle cx="6" cy="8" r="4" fill="#34d399"/>
        <text x="20" y="12" font-size="13" fill="#cbd5e1">Official MCP Registry · 2,047</text>
      </g>
      <g transform="translate(0, 40)">
        <circle cx="6" cy="8" r="4" fill="#22d3ee"/>
        <text x="20" y="12" font-size="13" fill="#cbd5e1">PulseMCP · 15,000+</text>
      </g>
      <g transform="translate(0, 62)">
        <circle cx="6" cy="8" r="4" fill="#818cf8"/>
        <text x="20" y="12" font-size="13" fill="#cbd5e1">Smithery · 7,300</text>
      </g>
      <g transform="translate(0, 84)">
        <circle cx="6" cy="8" r="4" fill="#fbbf24"/>
        <text x="20" y="12" font-size="13" fill="#cbd5e1">Composio · 20,000 tools</text>
      </g>
    </g>
  </g>

  <!-- callout: governance -->
  <g transform="translate(80, 470)">
    <rect x="0" y="0" width="420" height="92" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <text x="22" y="32" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">DEC 10, 2025</text>
    <text x="22" y="58" font-family="Inter, sans-serif" font-size="15" fill="#e2e8f0">Protocol donated to AAIF</text>
    <text x="22" y="78" font-family="Inter, sans-serif" font-size="13" fill="#64748b" font-style="italic">under the Linux Foundation</text>
  </g>

  <g transform="translate(80, 590)">
    <circle cx="0" cy="-6" r="5" fill="url(#cyanGrad)"/>
    <text x="14" y="0" font-family="Inter, sans-serif" font-size="14" fill="#64748b">bvsbharat.com  ·  Jan 2026</text>
  </g>
</svg>
