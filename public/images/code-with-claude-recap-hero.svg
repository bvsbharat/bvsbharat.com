<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">CODE WITH CLAUDE  ·  MAY 6, 2026</text>
    <text x="80" y="186" font-size="60" font-weight="800" fill="#f8fafc">Five things</text>
    <text x="80" y="252" font-size="60" font-weight="800" fill="url(#amberGrad)">that actually matter</text>
    <text x="80" y="308" font-size="22" font-weight="400" fill="#cbd5e1">Dreaming · Outcomes · Multi-agent · Sandboxes · Colossus</text>
  </g>

  <!-- 5 feature tiles in a grid -->
  <g transform="translate(80, 360)" filter="url(#softShadow)">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="200" height="180" rx="14" fill="#1e293b" stroke="url(#indigoGrad)" stroke-width="2"/>
      <text x="20" y="36" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#818cf8" letter-spacing="2">01</text>
      <text x="20" y="76" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Dreaming</text>
      <text x="20" y="100" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">offline reflection</text>
      <text x="20" y="118" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">on memory</text>
      <text x="20" y="158" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#fbbf24">research preview</text>
    </g>

    <g transform="translate(215, 0)">
      <rect x="0" y="0" width="200" height="180" rx="14" fill="#1e293b" stroke="url(#greenGrad)" stroke-width="2"/>
      <text x="20" y="36" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#34d399" letter-spacing="2">02</text>
      <text x="20" y="76" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Outcomes</text>
      <text x="20" y="100" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">rubric-based</text>
      <text x="20" y="118" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">self-grading</text>
      <text x="20" y="158" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#34d399">public beta</text>
    </g>

    <g transform="translate(430, 0)">
      <rect x="0" y="0" width="200" height="180" rx="14" fill="#1e293b" stroke="url(#cyanGrad)" stroke-width="2"/>
      <text x="20" y="36" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" letter-spacing="2">03</text>
      <text x="20" y="76" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Multi-agent</text>
      <text x="20" y="100" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">depth-1 lead</text>
      <text x="20" y="118" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">+ specialists</text>
      <text x="20" y="158" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#22d3ee">public beta</text>
    </g>

    <g transform="translate(645, 0)">
      <rect x="0" y="0" width="200" height="180" rx="14" fill="#1e293b" stroke="url(#amberGrad)" stroke-width="2"/>
      <text x="20" y="36" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fbbf24" letter-spacing="2">04</text>
      <text x="20" y="76" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Sandboxes</text>
      <text x="20" y="100" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">+ private MCP</text>
      <text x="20" y="118" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">first-party</text>
      <text x="20" y="158" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#fbbf24">GA</text>
    </g>

    <g transform="translate(860, 0)">
      <rect x="0" y="0" width="200" height="180" rx="14" fill="#1e293b" stroke="url(#roseGrad)" stroke-width="2"/>
      <text x="20" y="36" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fb7185" letter-spacing="2">05</text>
      <text x="20" y="76" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#f8fafc">Colossus</text>
      <text x="20" y="100" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">SpaceX DC deal</text>
      <text x="20" y="118" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">2× limits</text>
      <text x="20" y="158" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#fb7185">capacity unlock</text>
    </g>
  </g>

  <g transform="translate(80, 590)">
    <circle cx="0" cy="-6" r="5" fill="url(#amberGrad)"/>
    <text x="14" y="0" font-family="Inter, sans-serif" font-size="14" fill="#64748b">bvsbharat.com  ·  May 2026</text>
  </g>
</svg>
