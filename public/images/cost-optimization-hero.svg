<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">COST  ENGINEERING</text>
    <text x="80" y="186" font-size="60" font-weight="800" fill="#f8fafc">$0.39 to $0.037</text>
    <text x="80" y="252" font-size="60" font-weight="800" fill="url(#greenGrad)">per task · 10.5×</text>
    <text x="80" y="308" font-size="22" font-weight="400" fill="#cbd5e1">Four moves that compound, in order</text>
  </g>

  <!-- staircase chart -->
  <g transform="translate(700, 130)" filter="url(#softShadow)">
    <rect x="0" y="0" width="450" height="380" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1"/>
    <text x="24" y="34" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">COST / TASK · STACKED REDUCTIONS</text>

    <g transform="translate(24, 60)">
      <!-- baseline -->
      <rect x="0" y="0" width="380" height="46" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <text x="14" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="1">BASELINE</text>
      <text x="14" y="37" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">single Opus loop</text>
      <text x="366" y="30" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="16" font-weight="700" fill="#fb7185">$0.390</text>

      <!-- move 1 -->
      <rect x="0" y="60" width="320" height="46" rx="6" fill="#1e293b" stroke="url(#indigoGrad)" stroke-width="1.5"/>
      <text x="14" y="80" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#818cf8" letter-spacing="1">+ MODEL/STEP  3.1×</text>
      <text x="14" y="97" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">Opus · Sonnet · Haiku</text>
      <text x="306" y="90" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="16" font-weight="700" fill="#cbd5e1">$0.126</text>

      <!-- move 2 -->
      <rect x="0" y="120" width="220" height="46" rx="6" fill="#1e293b" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <text x="14" y="140" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" letter-spacing="1">+ CACHING  1.9×</text>
      <text x="14" y="157" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">stable prefix</text>
      <text x="206" y="150" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="16" font-weight="700" fill="#cbd5e1">$0.066</text>

      <!-- move 3 -->
      <rect x="0" y="180" width="160" height="46" rx="6" fill="#1e293b" stroke="url(#amberGrad)" stroke-width="1.5"/>
      <text x="14" y="200" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#fbbf24" letter-spacing="1">+ DISTILL  1.4×</text>
      <text x="14" y="217" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">tool results</text>
      <text x="146" y="210" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="16" font-weight="700" fill="#cbd5e1">$0.047</text>

      <!-- move 4 -->
      <rect x="0" y="240" width="115" height="46" rx="6" fill="#1e293b" stroke="url(#greenGrad)" stroke-width="2"/>
      <text x="14" y="260" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#34d399" letter-spacing="1">+ LOOP  1.25×</text>
      <text x="14" y="277" font-family="Inter, sans-serif" font-size="13" fill="#cbd5e1">memoize plans</text>
      <text x="101" y="270" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="700" fill="#34d399">$0.037</text>
    </g>
  </g>

  <g transform="translate(80, 590)">
    <circle cx="0" cy="-6" r="5" fill="url(#greenGrad)"/>
    <text x="14" y="0" font-family="Inter, sans-serif" font-size="14" fill="#64748b">bvsbharat.com  ·  Mar 2026</text>
  </g>
</svg>
