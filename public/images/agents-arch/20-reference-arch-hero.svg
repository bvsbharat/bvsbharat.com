<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="indigo3Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  20</text>
    <text x="80" y="200" font-size="56" font-weight="800" fill="#f8fafc">One enterprise</text>
    <text x="80" y="262" font-size="56" font-weight="800" fill="url(#indigo3Grad)">reference platform</text>
    <text x="80" y="316" font-size="20" font-weight="400" fill="#cbd5e1">Eighteen weeks of patterns, one architecture</text>
  </g>

  <g transform="translate(720, 130)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="0" y="0" width="380" height="32" rx="8" fill="#1e293b" stroke="#c7d2fe" stroke-width="1.5"/>
    <text x="190" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#c7d2fe">CLIENT SURFACES</text>

    <rect x="0" y="40" width="380" height="32" rx="8" fill="#1e293b" stroke="#fda4af" stroke-width="1.5"/>
    <text x="190" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#fda4af">GATEWAY · auth · rate-limit</text>

    <rect x="0" y="80" width="123" height="56" rx="8" fill="#1e293b" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="62" y="104" text-anchor="middle" font-size="10" font-weight="700" fill="#6ee7b7">FOREGROUND</text>
    <text x="62" y="122" text-anchor="middle" font-size="10" fill="#94a3b8">LangGraph</text>

    <rect x="128" y="80" width="124" height="56" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="190" y="104" text-anchor="middle" font-size="10" font-weight="700" fill="#fbbf24">BACKGROUND</text>
    <text x="190" y="122" text-anchor="middle" font-size="10" fill="#94a3b8">queue workers</text>

    <rect x="257" y="80" width="123" height="56" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="318" y="104" text-anchor="middle" font-size="10" font-weight="700" fill="#a78bfa">STATEFUL</text>
    <text x="318" y="122" text-anchor="middle" font-size="10" fill="#94a3b8">Managed Agents</text>

    <rect x="0" y="144" width="380" height="56" rx="8" fill="#1e293b" stroke="#67e8f9" stroke-width="1.5"/>
    <text x="190" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#67e8f9">SHARED PLATFORM SERVICES</text>
    <text x="190" y="186" text-anchor="middle" font-size="10" fill="#94a3b8">MCP · memory · retrieval · eval · registry</text>

    <rect x="0" y="208" width="380" height="40" rx="8" fill="#1e293b" stroke="#f0abfc" stroke-width="1.5"/>
    <text x="190" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#f0abfc">CROSS-CUTTING · trace · policy · audit</text>

    <rect x="0" y="256" width="380" height="32" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="190" y="276" text-anchor="middle" font-size="10" fill="#94a3b8">LLM Providers · failover-capable</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#indigo3Grad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  May 18, 2026</text>
  </g>
</svg>
