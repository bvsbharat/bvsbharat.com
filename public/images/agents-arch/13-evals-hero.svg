<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="limeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bef264"/>
      <stop offset="100%" stop-color="#65a30d"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  13</text>
    <text x="80" y="200" font-size="60" font-weight="800" fill="#f8fafc">Eval the loop,</text>
    <text x="80" y="270" font-size="60" font-weight="800" fill="url(#limeGrad)">not just the answer</text>
    <text x="80" y="324" font-size="22" font-weight="400" fill="#cbd5e1">Golden sets · trajectory grading · LLM-as-judge</text>
  </g>

  <g transform="translate(720, 160)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="0" y="0" width="380" height="80" rx="14" fill="#1e293b" stroke="#fb7185" stroke-width="2"/>
    <circle cx="34" cy="40" r="18" fill="#fb7185"/>
    <text x="34" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">L3</text>
    <text x="64" y="32" font-size="14" font-weight="700" fill="#f8fafc">LLM-as-judge</text>
    <text x="64" y="54" font-size="11" fill="#94a3b8">faithfulness · helpfulness · nightly</text>

    <rect x="0" y="92" width="380" height="80" rx="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="34" cy="132" r="18" fill="#fbbf24"/>
    <text x="34" y="138" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">L2</text>
    <text x="64" y="124" font-size="14" font-weight="700" fill="#f8fafc">Trajectory grading</text>
    <text x="64" y="146" font-size="11" fill="#94a3b8">right tools · right order · on every PR</text>

    <rect x="0" y="184" width="380" height="80" rx="14" fill="#1e293b" stroke="#bef264" stroke-width="2"/>
    <circle cx="34" cy="224" r="18" fill="#bef264"/>
    <text x="34" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">L1</text>
    <text x="64" y="216" font-size="14" font-weight="700" fill="#f8fafc">Golden / unit tests</text>
    <text x="64" y="238" font-size="11" fill="#94a3b8">deterministic · fast · cheap</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#limeGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Mar 30, 2026</text>
  </g>
</svg>
