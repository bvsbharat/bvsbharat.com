<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="indigo2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  12</text>
    <text x="80" y="200" font-size="60" font-weight="800" fill="#f8fafc">If you can't see it,</text>
    <text x="80" y="270" font-size="60" font-weight="800" fill="url(#indigo2Grad)">you can't fix it</text>
    <text x="80" y="324" font-size="22" font-weight="400" fill="#cbd5e1">Traces · metrics · debugging at scale</text>
  </g>

  <g transform="translate(720, 150)" filter="url(#softShadow)" font-family="ui-monospace, Menlo, monospace">
    <rect x="0" y="0" width="380" height="30" rx="6" fill="#1e293b" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="10" y="20" font-size="11" fill="#a5b4fc">trace · ticket-9421 · 3.4s · 12k tok · $0.09</text>

    <rect x="20" y="40" width="340" height="22" rx="4" fill="#0f172a" stroke="#4338ca" stroke-width="1"/>
    <text x="30" y="55" font-size="10" fill="#a5b4fc">plan · 410ms</text>

    <rect x="40" y="68" width="320" height="22" rx="4" fill="#0f172a" stroke="#6366f1" stroke-width="1"/>
    <text x="50" y="83" font-size="10" fill="#a5b4fc">llm.invoke · 380ms · 1842/67</text>

    <rect x="20" y="96" width="340" height="22" rx="4" fill="#0f172a" stroke="#4338ca" stroke-width="1"/>
    <text x="30" y="111" font-size="10" fill="#a5b4fc">call_tool · get_invoice · 142ms</text>

    <rect x="40" y="124" width="320" height="22" rx="4" fill="#0f172a" stroke="#6366f1" stroke-width="1"/>
    <text x="50" y="139" font-size="10" fill="#a5b4fc">http.get · billing/INV-2026-0042 · 128ms · 200</text>

    <rect x="20" y="152" width="340" height="22" rx="4" fill="#0f172a" stroke="#4338ca" stroke-width="1"/>
    <text x="30" y="167" font-size="10" fill="#a5b4fc">plan · 380ms</text>

    <rect x="20" y="180" width="340" height="22" rx="4" fill="#0f172a" stroke="#fb7185" stroke-width="1.5"/>
    <text x="30" y="195" font-size="10" fill="#fb7185">call_tool · issue_refund · interrupt</text>

    <rect x="20" y="220" width="340" height="50" rx="8" fill="#0f172a" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="190" y="244" text-anchor="middle" font-size="11" fill="#94a3b8" font-family="Inter, sans-serif">cost · p95 · success · interrupt rate</text>
    <text x="190" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#a5b4fc" font-family="Inter, sans-serif">aggregated metrics</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#indigo2Grad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Mar 23, 2026</text>
  </g>
</svg>
