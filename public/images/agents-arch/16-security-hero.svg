<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  16</text>
    <text x="80" y="200" font-size="60" font-weight="800" fill="#f8fafc">Injection isn't</text>
    <text x="80" y="270" font-size="60" font-weight="800" fill="url(#redGrad)">solved. Mitigated.</text>
    <text x="80" y="324" font-size="22" font-weight="400" fill="#cbd5e1">Sandbox · scoped credentials · HITL on destructive</text>
  </g>

  <g transform="translate(720, 130)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <g transform="translate(80, 0)">
      <path d="M 110 0 L 220 28 L 220 130 Q 220 200 110 240 Q 0 200 0 130 L 0 28 Z" fill="#1e293b" stroke="#fda4af" stroke-width="2.5"/>
      <g transform="translate(110, 120)">
        <rect x="-26" y="-12" width="52" height="46" rx="6" fill="#1e293b" stroke="#fda4af" stroke-width="2"/>
        <path d="M -16 -12 Q -16 -34 0 -34 Q 16 -34 16 -12" stroke="#fda4af" stroke-width="2" fill="none"/>
        <circle cx="0" cy="10" r="4" fill="#fda4af"/>
        <line x1="0" y1="14" x2="0" y2="22" stroke="#fda4af" stroke-width="2"/>
      </g>
    </g>

    <g transform="translate(0, 270)">
      <rect x="0" y="0" width="380" height="22" rx="6" fill="#0f172a" stroke="#be123c" stroke-width="1"/>
      <text x="10" y="16" font-size="11" font-weight="700" fill="#fda4af">input separation</text>
      <text x="370" y="16" text-anchor="end" font-size="10" fill="#94a3b8">layer 1</text>

      <rect x="0" y="28" width="380" height="22" rx="6" fill="#0f172a" stroke="#be123c" stroke-width="1"/>
      <text x="10" y="44" font-size="11" font-weight="700" fill="#fda4af">capability narrowing</text>
      <text x="370" y="44" text-anchor="end" font-size="10" fill="#94a3b8">layer 2</text>

      <rect x="0" y="56" width="380" height="22" rx="6" fill="#0f172a" stroke="#be123c" stroke-width="1.5"/>
      <text x="10" y="72" font-size="11" font-weight="700" fill="#fda4af">human-in-the-loop</text>
      <text x="370" y="72" text-anchor="end" font-size="10" fill="#94a3b8">layer 3</text>
    </g>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#redGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Apr 20, 2026</text>
  </g>
</svg>
