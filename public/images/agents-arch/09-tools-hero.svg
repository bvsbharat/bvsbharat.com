<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  09</text>
    <text x="80" y="200" font-size="56" font-weight="800" fill="#f8fafc">Tools, ReAct,</text>
    <text x="80" y="262" font-size="56" font-weight="800" fill="url(#emeraldGrad)">and the MCP era</text>
    <text x="80" y="316" font-size="20" font-weight="400" fill="#cbd5e1">Scoped tool sets · structured args · standardized surface</text>
  </g>

  <g transform="translate(720, 160)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="100" y="0" width="180" height="60" rx="14" fill="#1e293b" stroke="#6ee7b7" stroke-width="2"/>
    <text x="190" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#6ee7b7">AGENT</text>
    <text x="190" y="48" text-anchor="middle" font-size="11" fill="#94a3b8">function-calling API</text>

    <rect x="0" y="120" width="110" height="80" rx="12" fill="#1e293b" stroke="#6ee7b7" stroke-width="2"/>
    <text x="55" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#6ee7b7" letter-spacing="1">LOCAL</text>
    <text x="55" y="170" text-anchor="middle" font-size="11" fill="#94a3b8">@tool</text>
    <text x="55" y="186" text-anchor="middle" font-size="11" fill="#94a3b8">in-process</text>

    <rect x="130" y="120" width="120" height="80" rx="12" fill="#1e293b" stroke="#059669" stroke-width="2"/>
    <text x="190" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#059669" letter-spacing="1">PROVIDER</text>
    <text x="190" y="170" text-anchor="middle" font-size="11" fill="#94a3b8">bash · file</text>
    <text x="190" y="186" text-anchor="middle" font-size="11" fill="#94a3b8">code-interp</text>

    <rect x="270" y="120" width="110" height="80" rx="12" fill="#1e293b" stroke="#6ee7b7" stroke-width="2"/>
    <text x="325" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#6ee7b7" letter-spacing="1">MCP</text>
    <text x="325" y="170" text-anchor="middle" font-size="11" fill="#94a3b8">servers</text>
    <text x="325" y="186" text-anchor="middle" font-size="11" fill="#94a3b8">JSON-RPC / SSE</text>

    <line x1="160" y1="60" x2="55" y2="118" stroke="#475569" stroke-width="1.5"/>
    <line x1="190" y1="60" x2="190" y2="118" stroke="#475569" stroke-width="1.5"/>
    <line x1="220" y1="60" x2="325" y2="118" stroke="#475569" stroke-width="1.5"/>

    <text x="190" y="240" text-anchor="middle" font-size="12" font-style="italic" fill="#6ee7b7">MCP &gt; 97M downloads · 2026</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#emeraldGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Mar 2, 2026</text>
  </g>
</svg>
