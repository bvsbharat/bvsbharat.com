<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="rose2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr18h" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#fda4af"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  18</text>
    <text x="80" y="200" font-size="56" font-weight="800" fill="#f8fafc">Supervisor,</text>
    <text x="80" y="262" font-size="56" font-weight="800" fill="url(#rose2Grad)">workers, plan</text>
    <text x="80" y="316" font-size="20" font-weight="400" fill="#cbd5e1">The org-chart pattern, applied to agents</text>
  </g>

  <g transform="translate(720, 160)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="115" y="0" width="160" height="68" rx="14" fill="#1e293b" stroke="#fda4af" stroke-width="2.5"/>
    <text x="195" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#fda4af">SUPERVISOR</text>
    <text x="195" y="52" text-anchor="middle" font-size="11" fill="#94a3b8">routes · plans · retries</text>

    <rect x="0" y="148" width="80" height="70" rx="12" fill="#1e293b" stroke="#e11d48" stroke-width="2"/>
    <text x="40" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#e11d48">Worker A</text>
    <text x="40" y="196" text-anchor="middle" font-size="10" fill="#94a3b8">research</text>

    <rect x="100" y="148" width="80" height="70" rx="12" fill="#1e293b" stroke="#e11d48" stroke-width="2"/>
    <text x="140" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#e11d48">Worker B</text>
    <text x="140" y="196" text-anchor="middle" font-size="10" fill="#94a3b8">code-gen</text>

    <rect x="200" y="148" width="80" height="70" rx="12" fill="#1e293b" stroke="#e11d48" stroke-width="2"/>
    <text x="240" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#e11d48">Worker C</text>
    <text x="240" y="196" text-anchor="middle" font-size="10" fill="#94a3b8">summarize</text>

    <rect x="300" y="148" width="80" height="70" rx="12" fill="#1e293b" stroke="#e11d48" stroke-width="2"/>
    <text x="340" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#e11d48">Worker D</text>
    <text x="340" y="196" text-anchor="middle" font-size="10" fill="#94a3b8">verify</text>

    <line x1="160" y1="68" x2="40" y2="146" stroke="#475569" stroke-width="1.5" marker-end="url(#arr18h)"/>
    <line x1="180" y1="68" x2="140" y2="146" stroke="#475569" stroke-width="1.5" marker-end="url(#arr18h)"/>
    <line x1="210" y1="68" x2="240" y2="146" stroke="#475569" stroke-width="1.5" marker-end="url(#arr18h)"/>
    <line x1="230" y1="68" x2="340" y2="146" stroke="#475569" stroke-width="1.5" marker-end="url(#arr18h)"/>

    <rect x="80" y="240" width="220" height="40" rx="10" fill="#1e293b" stroke="#fda4af" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="190" y="265" text-anchor="middle" font-size="11" fill="#fda4af">Shared state / artifacts</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#rose2Grad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  May 4, 2026</text>
  </g>
</svg>
