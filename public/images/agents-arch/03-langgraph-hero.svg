<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr3h" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  03</text>
    <text x="80" y="200" font-size="60" font-weight="800" fill="#f8fafc">LangGraph,</text>
    <text x="80" y="270" font-size="60" font-weight="800" fill="url(#cyanGrad)">the deep dive</text>
    <text x="80" y="324" font-size="22" font-weight="400" fill="#cbd5e1">State machines · reducers · checkpoints</text>
  </g>

  <g transform="translate(720, 180)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <ellipse cx="60" cy="40" rx="44" ry="28" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="60" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#22d3ee">START</text>

    <rect x="150" y="14" width="130" height="52" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="215" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">plan</text>

    <polygon points="326,40 374,16 422,40 374,64" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="374" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="#22d3ee">route</text>

    <rect x="20" y="130" width="170" height="54" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="105" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">call_tool</text>
    <text x="105" y="174" text-anchor="middle" font-size="11" fill="#94a3b8">tool execution</text>

    <rect x="230" y="130" width="170" height="54" rx="12" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="315" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">summarize</text>
    <text x="315" y="174" text-anchor="middle" font-size="11" fill="#94a3b8">on budget cap</text>

    <ellipse cx="375" cy="240" rx="44" ry="28" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="375" y="246" text-anchor="middle" font-size="12" font-weight="700" fill="#22d3ee">END</text>

    <line x1="104" y1="40" x2="148" y2="40" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr3h)"/>
    <line x1="280" y1="40" x2="324" y2="40" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr3h)"/>
    <line x1="374" y1="64" x2="105" y2="128" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr3h)"/>
    <line x1="374" y1="64" x2="315" y2="128" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr3h)"/>
    <line x1="105" y1="184" x2="335" y2="216" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr3h)"/>
    <line x1="315" y1="184" x2="368" y2="216" stroke="#22d3ee" stroke-width="2" marker-end="url(#arr3h)"/>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#cyanGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Jan 19, 2026</text>
  </g>
</svg>
