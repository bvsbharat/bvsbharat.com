<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  15</text>
    <text x="80" y="200" font-size="60" font-weight="800" fill="#f8fafc">Cost is also</text>
    <text x="80" y="270" font-size="60" font-weight="800" fill="url(#yellowGrad)">an eval metric</text>
    <text x="80" y="324" font-size="22" font-weight="400" fill="#cbd5e1">Prompt caching · tiered routing · retrieval budgets</text>
  </g>

  <g transform="translate(720, 140)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <text x="0" y="20" font-size="11" font-weight="700" fill="#fef08a" letter-spacing="2">$ / TASK</text>

    <text x="0" y="56" font-size="11" fill="#cbd5e1">input (uncached)</text>
    <rect x="140" y="44" width="240" height="16" rx="3" fill="#fef08a" opacity="0.9"/>
    <text x="290" y="56" text-anchor="middle" font-size="10" fill="#0f172a" font-weight="700">~60%</text>

    <text x="0" y="92" font-size="11" fill="#cbd5e1">input (cached)</text>
    <rect x="140" y="80" width="60" height="16" rx="3" fill="#ca8a04" opacity="0.8"/>
    <text x="170" y="92" text-anchor="middle" font-size="10" fill="#0f172a" font-weight="700">~10%</text>

    <text x="0" y="128" font-size="11" fill="#cbd5e1">output</text>
    <rect x="140" y="116" width="80" height="16" rx="3" fill="#fef08a" opacity="0.7"/>
    <text x="180" y="128" text-anchor="middle" font-size="10" fill="#0f172a" font-weight="700">~15%</text>

    <text x="0" y="164" font-size="11" fill="#cbd5e1">compute</text>
    <rect x="140" y="152" width="50" height="16" rx="3" fill="#fef08a" opacity="0.5"/>
    <text x="165" y="164" text-anchor="middle" font-size="10" fill="#0f172a" font-weight="700">~10%</text>

    <text x="0" y="200" font-size="11" fill="#cbd5e1">embeddings</text>
    <rect x="140" y="188" width="20" height="16" rx="3" fill="#fef08a" opacity="0.4"/>
    <text x="150" y="200" text-anchor="middle" font-size="10" fill="#0f172a" font-weight="700">~5%</text>

    <rect x="0" y="230" width="380" height="50" rx="10" fill="#1e293b" stroke="#fef08a" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="190" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#fef08a">Cache hit rate &gt; 70%</text>
    <text x="190" y="270" text-anchor="middle" font-size="11" fill="#94a3b8">= 40–70% cost cut</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#yellowGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Apr 13, 2026</text>
  </g>
</svg>
