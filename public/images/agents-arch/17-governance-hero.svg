<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="fuchsiaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#a21caf"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  17</text>
    <text x="80" y="200" font-size="60" font-weight="800" fill="#f8fafc">Policy as code,</text>
    <text x="80" y="270" font-size="60" font-weight="800" fill="url(#fuchsiaGrad)">audit as law</text>
    <text x="80" y="324" font-size="22" font-weight="400" fill="#cbd5e1">Agent card · OPA · immutable audit log</text>
  </g>

  <g transform="translate(720, 150)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="0" y="0" width="120" height="80" rx="12" fill="#1e293b" stroke="#f0abfc" stroke-width="2"/>
    <text x="60" y="28" text-anchor="middle" font-size="11" font-weight="700" fill="#f0abfc" letter-spacing="1">CARD</text>
    <text x="60" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">owner</text>
    <text x="60" y="66" text-anchor="middle" font-size="11" fill="#94a3b8">scope · risk</text>

    <rect x="130" y="0" width="120" height="80" rx="12" fill="#1e293b" stroke="#a21caf" stroke-width="2"/>
    <text x="190" y="28" text-anchor="middle" font-size="11" font-weight="700" fill="#f0abfc" letter-spacing="1">POLICY</text>
    <text x="190" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">OPA · Cedar</text>
    <text x="190" y="66" text-anchor="middle" font-size="11" fill="#94a3b8">allow / approve</text>

    <rect x="260" y="0" width="120" height="80" rx="12" fill="#1e293b" stroke="#f0abfc" stroke-width="2"/>
    <text x="320" y="28" text-anchor="middle" font-size="11" font-weight="700" fill="#f0abfc" letter-spacing="1">AUDIT</text>
    <text x="320" y="50" text-anchor="middle" font-size="11" fill="#94a3b8">immutable</text>
    <text x="320" y="66" text-anchor="middle" font-size="11" fill="#94a3b8">actor · action</text>

    <rect x="0" y="100" width="380" height="76" rx="12" fill="#1e293b" stroke="#a21caf" stroke-width="2"/>
    <text x="190" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#f0abfc">RUNTIME — enforces policy</text>
    <text x="190" y="150" text-anchor="middle" font-size="11" fill="#cbd5e1">every tool call · check · log · execute</text>
    <text x="190" y="166" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">no bypass</text>

    <rect x="40" y="196" width="300" height="56" rx="12" fill="#1e293b" stroke="#f0abfc" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="190" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#f0abfc">Risk register · Review board</text>
    <text x="190" y="240" text-anchor="middle" font-size="11" fill="#94a3b8">EU AI Act · NIST · sectoral</text>

    <line x1="60" y1="80" x2="100" y2="98" stroke="#475569" stroke-width="1.5"/>
    <line x1="190" y1="80" x2="190" y2="98" stroke="#475569" stroke-width="1.5"/>
    <line x1="320" y1="80" x2="280" y2="98" stroke="#475569" stroke-width="1.5"/>
    <line x1="190" y1="176" x2="190" y2="194" stroke="#475569" stroke-width="1.5"/>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#fuchsiaGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Apr 27, 2026</text>
  </g>
</svg>
