<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr21h" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L8,4 z" fill="#d8b4fe"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  21</text>
    <text x="80" y="200" font-size="56" font-weight="800" fill="#f8fafc">Twenty-one Mondays.</text>
    <text x="80" y="262" font-size="56" font-weight="800" fill="url(#purpleGrad)">The road ahead.</text>
    <text x="80" y="316" font-size="20" font-weight="400" fill="#cbd5e1">What 2026 settled · what it didn't · the bets that age</text>
  </g>

  <g transform="translate(720, 150)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <text x="0" y="20" font-size="11" font-weight="700" fill="#d8b4fe" letter-spacing="2">SETTLED  IN  2026</text>
    <rect x="0" y="32" width="380" height="22" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="12" y="48" font-size="11" fill="#86efac">✓ state machines won</text>
    <rect x="0" y="60" width="380" height="22" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="12" y="76" font-size="11" fill="#86efac">✓ hybrid retrieval &gt; pure vector</text>
    <rect x="0" y="88" width="380" height="22" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="12" y="104" font-size="11" fill="#86efac">✓ managed runtimes default</text>
    <rect x="0" y="116" width="380" height="22" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="12" y="132" font-size="11" fill="#86efac">✓ MCP as the tool standard</text>
    <rect x="0" y="144" width="380" height="22" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="12" y="160" font-size="11" fill="#86efac">✓ memory is infrastructure</text>

    <text x="0" y="200" font-size="11" font-weight="700" fill="#d8b4fe" letter-spacing="2">UNSOLVED</text>
    <rect x="0" y="212" width="380" height="22" rx="6" fill="#0f172a" stroke="#f43f5e" stroke-width="1"/>
    <text x="12" y="228" font-size="11" fill="#fda4af">… prompt injection</text>
    <rect x="0" y="240" width="380" height="22" rx="6" fill="#0f172a" stroke="#f43f5e" stroke-width="1"/>
    <text x="12" y="256" font-size="11" fill="#fda4af">… memory staleness</text>
    <rect x="0" y="268" width="380" height="22" rx="6" fill="#0f172a" stroke="#f43f5e" stroke-width="1"/>
    <text x="12" y="284" font-size="11" fill="#fda4af">… 100+ agent coordination</text>

    <line x1="0" y1="312" x2="360" y2="312" stroke="#d8b4fe" stroke-width="2.5" marker-end="url(#arr21h)"/>
    <text x="180" y="328" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">2027 →</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#purpleGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  May 25, 2026</text>
  </g>
</svg>
