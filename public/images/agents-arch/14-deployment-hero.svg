<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="amber2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  14</text>
    <text x="80" y="200" font-size="56" font-weight="800" fill="#f8fafc">Three deployment</text>
    <text x="80" y="262" font-size="56" font-weight="800" fill="url(#amber2Grad)">shapes, one platform</text>
    <text x="80" y="316" font-size="20" font-weight="400" fill="#cbd5e1">Request / response · stateful · background batch</text>
  </g>

  <g transform="translate(720, 150)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="0" y="0" width="120" height="240" rx="14" fill="#1e293b" stroke="#fcd34d" stroke-width="2"/>
    <text x="60" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="#fcd34d" letter-spacing="2">REQ/RES</text>
    <text x="60" y="58" text-anchor="middle" font-size="12" fill="#cbd5e1">latency</text>
    <text x="60" y="78" text-anchor="middle" font-size="12" fill="#cbd5e1">sensitive</text>
    <rect x="22" y="98" width="76" height="22" rx="6" fill="#0f172a" stroke="#fcd34d" stroke-width="1"/>
    <text x="60" y="113" text-anchor="middle" font-size="10" fill="#fcd34d">Cloud Run</text>
    <rect x="22" y="126" width="76" height="22" rx="6" fill="#0f172a" stroke="#fcd34d" stroke-width="1"/>
    <text x="60" y="141" text-anchor="middle" font-size="10" fill="#fcd34d">Lambda</text>
    <rect x="22" y="154" width="76" height="22" rx="6" fill="#0f172a" stroke="#fcd34d" stroke-width="1"/>
    <text x="60" y="169" text-anchor="middle" font-size="10" fill="#fcd34d">Fargate</text>
    <text x="60" y="208" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">scales on</text>
    <text x="60" y="222" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">concurrency</text>

    <rect x="130" y="0" width="120" height="240" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="190" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b" letter-spacing="2">STATEFUL</text>
    <text x="190" y="58" text-anchor="middle" font-size="12" fill="#cbd5e1">multi-step</text>
    <text x="190" y="78" text-anchor="middle" font-size="12" fill="#cbd5e1">HITL</text>
    <rect x="152" y="98" width="76" height="22" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="190" y="113" text-anchor="middle" font-size="10" fill="#f59e0b">Managed</text>
    <rect x="152" y="126" width="76" height="22" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="190" y="141" text-anchor="middle" font-size="10" fill="#f59e0b">k8s + PVC</text>
    <rect x="152" y="154" width="76" height="22" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="190" y="169" text-anchor="middle" font-size="10" fill="#f59e0b">VM + ckpt</text>
    <text x="190" y="208" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">scales on</text>
    <text x="190" y="222" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">sessions</text>

    <rect x="260" y="0" width="120" height="240" rx="14" fill="#1e293b" stroke="#d97706" stroke-width="2"/>
    <text x="320" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706" letter-spacing="2">BATCH</text>
    <text x="320" y="58" text-anchor="middle" font-size="12" fill="#cbd5e1">async</text>
    <text x="320" y="78" text-anchor="middle" font-size="12" fill="#cbd5e1">queue-driven</text>
    <rect x="282" y="98" width="76" height="22" rx="6" fill="#0f172a" stroke="#d97706" stroke-width="1"/>
    <text x="320" y="113" text-anchor="middle" font-size="10" fill="#d97706">Workers</text>
    <rect x="282" y="126" width="76" height="22" rx="6" fill="#0f172a" stroke="#d97706" stroke-width="1"/>
    <text x="320" y="141" text-anchor="middle" font-size="10" fill="#d97706">SQS · NATS</text>
    <rect x="282" y="154" width="76" height="22" rx="6" fill="#0f172a" stroke="#d97706" stroke-width="1"/>
    <text x="320" y="169" text-anchor="middle" font-size="10" fill="#d97706">DAGs</text>
    <text x="320" y="208" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">scales on</text>
    <text x="320" y="222" text-anchor="middle" font-size="10" font-style="italic" fill="#94a3b8">queue depth</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#amber2Grad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Apr 6, 2026</text>
  </g>
</svg>
