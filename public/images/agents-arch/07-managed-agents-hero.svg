<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  07</text>
    <text x="80" y="200" font-size="56" font-weight="800" fill="#f8fafc">Managed Agents,</text>
    <text x="80" y="262" font-size="56" font-weight="800" fill="url(#orangeGrad)">when hosted wins</text>
    <text x="80" y="316" font-size="20" font-weight="400" fill="#cbd5e1">Claude Managed Agents vs Bedrock AgentCore</text>
  </g>

  <g transform="translate(700, 140)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="2">DIY</text>
    <rect x="0" y="14" width="170" height="38" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="12" y="38" font-size="11" fill="#94a3b8">Your agent loop</text>
    <rect x="0" y="58" width="170" height="38" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="12" y="82" font-size="11" fill="#94a3b8">Sandbox</text>
    <rect x="0" y="102" width="170" height="38" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="12" y="126" font-size="11" fill="#94a3b8">Session state</text>
    <rect x="0" y="146" width="170" height="38" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="12" y="170" font-size="11" fill="#94a3b8">Credentials · IAM</text>
    <rect x="0" y="190" width="170" height="38" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="12" y="214" font-size="11" fill="#94a3b8">k8s · containers</text>
    <rect x="0" y="234" width="170" height="38" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="12" y="258" font-size="11" fill="#94a3b8">Observability</text>

    <text x="210" y="0" font-size="11" font-weight="700" fill="#fb923c" letter-spacing="2">MANAGED</text>
    <rect x="210" y="14" width="170" height="38" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
    <text x="222" y="38" font-size="11" font-weight="700" fill="#fb923c">Your agent loop</text>
    <rect x="210" y="58" width="170" height="214" rx="8" fill="#1e293b" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="295" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#fb923c">Managed runtime</text>
    <text x="295" y="125" text-anchor="middle" font-size="11" fill="#94a3b8">sandboxed exec</text>
    <text x="295" y="145" text-anchor="middle" font-size="11" fill="#94a3b8">durable sessions</text>
    <text x="295" y="165" text-anchor="middle" font-size="11" fill="#94a3b8">scoped credentials</text>
    <text x="295" y="185" text-anchor="middle" font-size="11" fill="#94a3b8">container scheduling</text>
    <text x="295" y="205" text-anchor="middle" font-size="11" fill="#94a3b8">autoscale</text>
    <text x="295" y="225" text-anchor="middle" font-size="11" fill="#94a3b8">observability</text>
    <text x="295" y="258" text-anchor="middle" font-size="11" font-style="italic" fill="#fb923c">$0.08/session-hr</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#orangeGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Feb 16, 2026</text>
  </g>
</svg>
