<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  06</text>
    <text x="80" y="200" font-size="60" font-weight="800" fill="#f8fafc">Google ADK,</text>
    <text x="80" y="270" font-size="60" font-weight="800" fill="url(#skyGrad)">runtime-first</text>
    <text x="80" y="324" font-size="22" font-weight="400" fill="#cbd5e1">Event-driven engine · multi-language · Cloud Run / GKE</text>
  </g>

  <g transform="translate(720, 150)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="0" y="0" width="380" height="50" rx="10" fill="#1e293b" stroke="#7dd3fc" stroke-width="2"/>
    <text x="20" y="32" font-size="13" font-weight="700" fill="#7dd3fc">Triggers</text>
    <text x="360" y="32" text-anchor="end" font-size="11" fill="#94a3b8">HTTP · PubSub · Cron</text>

    <rect x="0" y="62" width="380" height="60" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
    <text x="20" y="92" font-size="14" font-weight="700" fill="#0ea5e9">ADK Runtime</text>
    <text x="20" y="112" font-size="11" fill="#94a3b8">event loop · state · telemetry</text>

    <rect x="0" y="134" width="120" height="100" rx="10" fill="#1e293b" stroke="#7dd3fc" stroke-width="2"/>
    <text x="60" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#7dd3fc">Agents</text>
    <text x="60" y="186" text-anchor="middle" font-size="10" fill="#94a3b8">LlmAgent</text>
    <text x="60" y="202" text-anchor="middle" font-size="10" fill="#94a3b8">Sequential</text>
    <text x="60" y="218" text-anchor="middle" font-size="10" fill="#94a3b8">Parallel · Loop</text>

    <rect x="130" y="134" width="120" height="100" rx="10" fill="#1e293b" stroke="#7dd3fc" stroke-width="2"/>
    <text x="190" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#7dd3fc">State</text>
    <text x="190" y="186" text-anchor="middle" font-size="10" fill="#94a3b8">memory</text>
    <text x="190" y="202" text-anchor="middle" font-size="10" fill="#94a3b8">Vertex Memory</text>
    <text x="190" y="218" text-anchor="middle" font-size="10" fill="#94a3b8">checkpoints</text>

    <rect x="260" y="134" width="120" height="100" rx="10" fill="#1e293b" stroke="#7dd3fc" stroke-width="2"/>
    <text x="320" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#7dd3fc">Tools</text>
    <text x="320" y="186" text-anchor="middle" font-size="10" fill="#94a3b8">FunctionTool</text>
    <text x="320" y="202" text-anchor="middle" font-size="10" fill="#94a3b8">MCP · A2A</text>
    <text x="320" y="218" text-anchor="middle" font-size="10" fill="#94a3b8">Vertex Ext</text>

    <rect x="0" y="246" width="380" height="40" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
    <text x="190" y="270" text-anchor="middle" font-size="12" fill="#7dd3fc">OpenTelemetry · Cloud Trace · Cloud Logging</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#skyGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Feb 9, 2026</text>
  </g>
</svg>
