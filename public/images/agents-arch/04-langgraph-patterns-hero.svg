<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="roseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  04</text>
    <text x="80" y="200" font-size="60" font-weight="800" fill="#f8fafc">Cycles, branches,</text>
    <text x="80" y="270" font-size="60" font-weight="800" fill="url(#roseGrad)">human-in-the-loop</text>
    <text x="80" y="324" font-size="22" font-weight="400" fill="#cbd5e1">The three patterns that turn a toy graph into a system</text>
  </g>

  <g transform="translate(740, 170)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="0" y="0" width="380" height="80" rx="14" fill="#1e293b" stroke="#fb7185" stroke-width="2"/>
    <text x="20" y="32" font-size="11" font-weight="700" fill="#fb7185" letter-spacing="2">PATTERN  01</text>
    <text x="20" y="58" font-size="16" font-weight="700" fill="#f8fafc">Bounded cycles</text>
    <text x="200" y="58" font-size="12" fill="#94a3b8">step + token budget</text>

    <rect x="0" y="100" width="380" height="80" rx="14" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
    <text x="20" y="132" font-size="11" font-weight="700" fill="#fb7185" letter-spacing="2">PATTERN  02</text>
    <text x="20" y="158" font-size="16" font-weight="700" fill="#f8fafc">Fan-out / fan-in</text>
    <text x="200" y="158" font-size="12" fill="#94a3b8">Send API · parallel</text>

    <rect x="0" y="200" width="380" height="80" rx="14" fill="#1e293b" stroke="#fb7185" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="20" y="232" font-size="11" font-weight="700" fill="#fb7185" letter-spacing="2">PATTERN  03</text>
    <text x="20" y="258" font-size="16" font-weight="700" fill="#f8fafc">Human-in-the-loop</text>
    <text x="240" y="258" font-size="12" fill="#94a3b8">interrupt + resume</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#roseGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Jan 26, 2026</text>
  </g>
</svg>
