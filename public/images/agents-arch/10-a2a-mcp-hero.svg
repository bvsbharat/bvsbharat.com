<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr10h" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#5eead4"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  10</text>
    <text x="80" y="200" font-size="60" font-weight="800" fill="#f8fafc">A2A and MCP,</text>
    <text x="80" y="270" font-size="60" font-weight="800" fill="url(#tealGrad)">protocols stick</text>
    <text x="80" y="324" font-size="22" font-weight="400" fill="#cbd5e1">How agents talk to tools and to each other</text>
  </g>

  <g transform="translate(720, 160)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="0" y="0" width="160" height="80" rx="14" fill="#1e293b" stroke="#5eead4" stroke-width="2"/>
    <text x="80" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#5eead4">Agent A</text>
    <text x="80" y="56" text-anchor="middle" font-size="11" fill="#94a3b8">researcher</text>

    <rect x="220" y="0" width="160" height="80" rx="14" fill="#1e293b" stroke="#0d9488" stroke-width="2"/>
    <text x="300" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#0d9488">Agent B</text>
    <text x="300" y="56" text-anchor="middle" font-size="11" fill="#94a3b8">writer</text>

    <rect x="140" y="34" width="120" height="22" rx="6" fill="#0f172a" stroke="#fb7185" stroke-width="1.5"/>
    <text x="200" y="49" text-anchor="middle" font-size="10" font-weight="700" fill="#fb7185">A2A</text>

    <rect x="0" y="130" width="120" height="60" rx="12" fill="#1e293b" stroke="#5eead4" stroke-width="1.5"/>
    <text x="60" y="156" text-anchor="middle" font-size="11" font-weight="700" fill="#5eead4">MCP</text>
    <text x="60" y="174" text-anchor="middle" font-size="10" fill="#94a3b8">web_search</text>

    <rect x="130" y="130" width="120" height="60" rx="12" fill="#1e293b" stroke="#5eead4" stroke-width="1.5"/>
    <text x="190" y="156" text-anchor="middle" font-size="11" font-weight="700" fill="#5eead4">MCP</text>
    <text x="190" y="174" text-anchor="middle" font-size="10" fill="#94a3b8">billing</text>

    <rect x="260" y="130" width="120" height="60" rx="12" fill="#1e293b" stroke="#5eead4" stroke-width="1.5"/>
    <text x="320" y="156" text-anchor="middle" font-size="11" font-weight="700" fill="#5eead4">MCP</text>
    <text x="320" y="174" text-anchor="middle" font-size="10" fill="#94a3b8">cms</text>

    <line x1="80" y1="80" x2="60" y2="128" stroke="#475569" stroke-width="1.5" marker-end="url(#arr10h)"/>
    <line x1="80" y1="80" x2="190" y2="128" stroke="#475569" stroke-width="1.5" marker-end="url(#arr10h)"/>
    <line x1="300" y1="80" x2="320" y2="128" stroke="#475569" stroke-width="1.5" marker-end="url(#arr10h)"/>

    <rect x="0" y="220" width="380" height="40" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="190" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">Durable bus · Kafka · NATS · SQS</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#tealGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Mar 9, 2026</text>
  </g>
</svg>
