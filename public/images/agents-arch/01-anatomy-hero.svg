<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  01</text>
    <text x="80" y="200" font-size="60" font-weight="800" fill="#f8fafc">Anatomy of</text>
    <text x="80" y="270" font-size="60" font-weight="800" fill="url(#indigoGrad)">an AI agent</text>
    <text x="80" y="324" font-size="22" font-weight="400" fill="#cbd5e1">Reasoning loop · tools · memory · control plane</text>
  </g>

  <g transform="translate(720, 130)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="0" y="0" width="180" height="110" rx="14" fill="#1e293b" stroke="#818cf8" stroke-width="2"/>
    <text x="90" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#818cf8" letter-spacing="2">REASONING</text>
    <text x="90" y="62" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Loop</text>
    <text x="90" y="86" text-anchor="middle" font-size="11" fill="#94a3b8">plan · act · observe</text>

    <rect x="220" y="0" width="180" height="110" rx="14" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
    <text x="310" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#22d3ee" letter-spacing="2">TOOLS</text>
    <text x="310" y="62" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Surface</text>
    <text x="310" y="86" text-anchor="middle" font-size="11" fill="#94a3b8">APIs · MCP · sandbox</text>

    <rect x="0" y="140" width="180" height="110" rx="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="90" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24" letter-spacing="2">MEMORY</text>
    <text x="90" y="202" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Store</text>
    <text x="90" y="226" text-anchor="middle" font-size="11" fill="#94a3b8">working · long-term</text>

    <rect x="220" y="140" width="180" height="110" rx="14" fill="#1e293b" stroke="#fb7185" stroke-width="2"/>
    <text x="310" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#fb7185" letter-spacing="2">CONTROL</text>
    <text x="310" y="202" text-anchor="middle" font-size="16" font-weight="700" fill="#f8fafc">Plane</text>
    <text x="310" y="226" text-anchor="middle" font-size="11" fill="#94a3b8">policy · budget · stop</text>

    <line x1="180" y1="55" x2="220" y2="55" stroke="#475569" stroke-width="2"/>
    <line x1="180" y1="195" x2="220" y2="195" stroke="#475569" stroke-width="2"/>
    <line x1="90" y1="110" x2="90" y2="140" stroke="#475569" stroke-width="2"/>
    <line x1="310" y1="110" x2="310" y2="140" stroke="#475569" stroke-width="2"/>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#indigoGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Jan 5, 2026</text>
  </g>
</svg>
