<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  02</text>
    <text x="80" y="200" font-size="56" font-weight="800" fill="#f8fafc">LangChain in</text>
    <text x="80" y="262" font-size="56" font-weight="800" fill="url(#greenGrad)">production 2026</text>
    <text x="80" y="316" font-size="20" font-weight="400" fill="#cbd5e1">The primitives that survived. The pieces to drop.</text>
  </g>

  <g transform="translate(700, 150)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="0" y="0" width="380" height="56" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="20" y="34" font-size="13" font-weight="700" fill="#cbd5e1">Your Application</text>
    <text x="360" y="34" text-anchor="end" font-size="11" fill="#64748b">FastAPI · worker · CLI</text>

    <rect x="0" y="72" width="380" height="56" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="20" y="106" font-size="13" font-weight="700" fill="#34d399">LangGraph</text>
    <text x="360" y="106" text-anchor="end" font-size="11" fill="#94a3b8">state · control flow</text>

    <rect x="0" y="144" width="380" height="76" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="20" y="172" font-size="13" font-weight="700" fill="#10b981">LangChain Core</text>
    <text x="20" y="194" font-size="11" fill="#94a3b8">Runnables · Tools · Retrievers · Parsers</text>
    <text x="360" y="172" text-anchor="end" font-size="11" fill="#64748b">composable</text>

    <rect x="0" y="236" width="120" height="56" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="60" y="270" text-anchor="middle" font-size="12" fill="#cbd5e1">LLMs</text>
    <rect x="130" y="236" width="120" height="56" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="190" y="270" text-anchor="middle" font-size="12" fill="#cbd5e1">Vector</text>
    <rect x="260" y="236" width="120" height="56" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="320" y="270" text-anchor="middle" font-size="12" fill="#cbd5e1">Tools / APIs</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#greenGrad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  Jan 12, 2026</text>
  </g>
</svg>
