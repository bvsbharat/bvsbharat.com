<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cyan2Grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="80" y="118" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="3">AGENTS  ARCH  ·  19</text>
    <text x="80" y="200" font-size="56" font-weight="800" fill="#f8fafc">Four frameworks,</text>
    <text x="80" y="262" font-size="56" font-weight="800" fill="url(#cyan2Grad)">four different bets</text>
    <text x="80" y="316" font-size="20" font-weight="400" fill="#cbd5e1">LangGraph · CrewAI · ADK · Managed Agents</text>
  </g>

  <g transform="translate(720, 150)" filter="url(#softShadow)" font-family="Inter, sans-serif">
    <rect x="0" y="0" width="180" height="130" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="90" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#a78bfa" letter-spacing="1">STATE MACHINE</text>
    <text x="90" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#f8fafc">LangGraph</text>
    <text x="90" y="88" text-anchor="middle" font-size="10" fill="#94a3b8">graph + checkpoints</text>
    <text x="90" y="108" text-anchor="middle" font-size="10" fill="#94a3b8">explicit control flow</text>

    <rect x="200" y="0" width="180" height="130" rx="14" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <text x="290" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24" letter-spacing="1">ROLE-BASED</text>
    <text x="290" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#f8fafc">CrewAI</text>
    <text x="290" y="88" text-anchor="middle" font-size="10" fill="#94a3b8">crews + flows</text>
    <text x="290" y="108" text-anchor="middle" font-size="10" fill="#94a3b8">people-shaped</text>

    <rect x="0" y="150" width="180" height="130" rx="14" fill="#1e293b" stroke="#67e8f9" stroke-width="2"/>
    <text x="90" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#67e8f9" letter-spacing="1">RUNTIME-FIRST</text>
    <text x="90" y="212" text-anchor="middle" font-size="15" font-weight="700" fill="#f8fafc">Google ADK</text>
    <text x="90" y="238" text-anchor="middle" font-size="10" fill="#94a3b8">multi-language</text>
    <text x="90" y="258" text-anchor="middle" font-size="10" fill="#94a3b8">Cloud Run / GKE</text>

    <rect x="200" y="150" width="180" height="130" rx="14" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
    <text x="290" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#fb923c" letter-spacing="1">HOSTED</text>
    <text x="290" y="212" text-anchor="middle" font-size="15" font-weight="700" fill="#f8fafc">Managed</text>
    <text x="290" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#f8fafc">Agents</text>
    <text x="290" y="258" text-anchor="middle" font-size="10" fill="#94a3b8">Claude · AgentCore</text>
  </g>

  <g transform="translate(80, 590)" font-family="Inter, sans-serif">
    <circle cx="0" cy="-6" r="5" fill="url(#cyan2Grad)"/>
    <text x="14" y="0" font-size="14" fill="#64748b">bvsbharat.com  ·  May 11, 2026</text>
  </g>
</svg>
